log4j.rootLogger=INFO, stdout

# Конфигурация для вывода в консоль
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%d{ISO8601} %p [%t] %c: %m%n

# Установите уровень логирования для Jetty на WARN
log4j.logger.org.eclipse.jetty=WARN
log4j.logger.org.eclipse.jetty.server=WARN
log4j.logger.org.eclipse.jetty.io=WARN